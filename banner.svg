<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">
    <defs>
          <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
                  <stop offset="50%" style="stop-color:#0f1b2d;stop-opacity:1" />
                  <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
          </linearGradient>
          <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" style="stop-color:#d97706;stop-opacity:1" />
                  <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
          </linearGradient>
          <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
                  <stop offset="60%" style="stop-color:#f0f6ff;stop-opacity:1" />
                  <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
          </linearGradient>
          <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" style="stop-color:#1e40af;stop-opacity:0.4" />
                  <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0" />
          </linearGradient>
          <filter id="glow">
                  <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                  <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                  </feMerge>
          </filter>
          <filter id="softglow">
                  <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
                  <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                  </feMerge>
          </filter>
    </defs>

    <!-- Background -->
    <rect width="1280" height="400" fill="url(#bgGrad)"/>

    <!-- Subtle grid lines -->
    <g opacity="0.04" stroke="#4a9eff" stroke-width="1">
          <line x1="0" y1="80" x2="1280" y2="80"/>
          <line x1="0" y1="160" x2="1280" y2="160"/>
          <line x1="0" y1="240" x2="1280" y2="240"/>
          <line x1="0" y1="320" x2="1280" y2="320"/>
          <line x1="160" y1="0" x2="160" y2="400"/>
          <line x1="320" y1="0" x2="320" y2="400"/>
          <line x1="480" y1="0" x2="480" y2="400"/>
          <line x1="640" y1="0" x2="640" y2="400"/>
          <line x1="800" y1="0" x2="800" y2="400"/>
          <line x1="960" y1="0" x2="960" y2="400"/>
          <line x1="1120" y1="0" x2="1120" y2="400"/>
    </g>

    <!-- Glow orb left -->
    <ellipse cx="100" cy="200" rx="200" ry="180" fill="#1e40af" opacity="0.08"/>

    <!-- Glow orb right -->
    <ellipse cx="1180" cy="200" rx="200" ry="180" fill="#d97706" opacity="0.07"/>

    <!-- Center glow -->
    <ellipse cx="640" cy="200" rx="350" ry="160" fill="#1e3a5f" opacity="0.15"/>

    <!-- Top accent bar -->
    <rect x="0" y="0" width="1280" height="3" fill="url(#accentGrad)"/>

    <!-- Bottom accent bar -->
    <rect x="0" y="397" width="1280" height="3" fill="url(#accentGrad)" opacity="0.5"/>

    <!-- Left decorative bracket -->
    <g opacity="0.25" stroke="#4a9eff" stroke-width="1.5" fill="none">
          <path d="M 60 120 L 40 120 L 40 280 L 60 280"/>
    </g>

    <!-- Right decorative bracket -->
    <g opacity="0.25" stroke="#f59e0b" stroke-width="1.5" fill="none">
          <path d="M 1220 120 L 1240 120 L 1240 280 L 1220 280"/>
    </g>

    <!-- Claude logo-style icon (hexagon) -->
    <g transform="translate(90, 175)">
          <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
          <polygon points="0,-18 15,-9 15,9 0,18 -15,9 -15,-9" fill="#f59e0b" opacity="0.15"/>
          <text x="0" y="6" font-family="monospace" font-size="14" fill="#f59e0b" text-anchor="middle" opacity="0.9">KM</text>
    </g>

    <!-- Divider line left of title -->
    <rect x="135" y="160" width="1" height="80" fill="#4a9eff" opacity="0.3"/>

    <!-- Main title -->
    <text x="640" y="155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="46" font-weight="700" fill="url(#titleGrad)" text-anchor="middle" filter="url(#glow)">Claude Market Skills</text>

    <!-- "by KM" accent -->
    <text x="640" y="198" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#f59e0b" text-anchor="middle" letter-spacing="4" opacity="0.9">by KM  ·  Kreative Minds</text>

    <!-- Tagline -->
    <text x="640" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="300" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">Marketing automation skills for Claude Code — audit, copy, emails, reports &amp; more</text>

    <!-- Feature pills row -->
    <!-- Pill 1: Audit -->
    <rect x="194" y="268" width="112" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" opacity="0.9"/>
    <text x="250" y="287" font-family="monospace" font-size="12" fill="#60a5fa" text-anchor="middle">/market audit</text>

    <!-- Pill 2: Copy -->
    <rect x="318" y="268" width="100" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" opacity="0.9"/>
    <text x="368" y="287" font-family="monospace" font-size="12" fill="#60a5fa" text-anchor="middle">/market copy</text>

    <!-- Pill 3: Emails -->
    <rect x="430" y="268" width="110" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" opacity="0.9"/>
    <text x="485" y="287" font-family="monospace" font-size="12" fill="#60a5fa" text-anchor="middle">/market emails</text>

    <!-- Pill 4: SEO -->
    <rect x="552" y="268" width="96" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" opacity="0.9"/>
    <text x="600" y="287" font-family="monospace" font-size="12" fill="#60a5fa" text-anchor="middle">/market seo</text>

    <!-- Pill 5: Report PDF -->
    <rect x="660" y="268" width="148" height="28" rx="14" fill="#78350f" stroke="#f59e0b" stroke-width="1" opacity="0.9"/>
    <text x="734" y="287" font-family="monospace" font-size="12" fill="#fbbf24" text-anchor="middle">/market report-pdf</text>

    <!-- Pill 6: Competitors -->
    <rect x="820" y="268" width="148" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" opacity="0.9"/>
    <text x="894" y="287" font-family="monospace" font-size="12" fill="#60a5fa" text-anchor="middle">/market competitors</text>

    <!-- Pill 7: + more -->
    <rect x="980" y="268" width="96" height="28" rx="14" fill="#1c1c2e" stroke="#4a4a6a" stroke-width="1" opacity="0.9"/>
    <text x="1028" y="287" font-family="-apple-system, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">+ 9 more</text>

    <!-- Score bar visual -->
    <g transform="translate(640, 335)" opacity="0.7">
          <!-- Score label -->
          <text x="-190" y="4" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="end">Marketing Score</text>
          <!-- Track -->
          <rect x="-180" y="-5" width="360" height="10" rx="5" fill="#1e293b"/>
          <!-- Fill (74%) -->
          <rect x="-180" y="-5" width="266" height="10" rx="5" fill="url(#accentGrad)" opacity="0.85"/>
          <!-- Score value -->
          <text x="195" y="4" font-family="monospace" font-size="10" fill="#f59e0b" text-anchor="start">74 / 100</text>
    </g>

    <!-- Bottom credit line -->
        <text x="640" y="375" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#fbbf24" text-anchor="middle" letter-spacing="1">kreativeminds.ae  ·  Non-Commercial License  ·  Claude Code Skills</text>

    <!-- Corner dots decoration -->
    <circle cx="20" cy="20" r="3" fill="#f59e0b" opacity="0.4"/>
    <circle cx="35" cy="20" r="2" fill="#f59e0b" opacity="0.2"/>
    <circle cx="20" cy="35" r="2" fill="#f59e0b" opacity="0.2"/>

    <circle cx="1260" cy="20" r="3" fill="#3b82f6" opacity="0.4"/>
    <circle cx="1245" cy="20" r="2" fill="#3b82f6" opacity="0.2"/>
    <circle cx="1260" cy="35" r="2" fill="#3b82f6" opacity="0.2"/>

    <circle cx="20" cy="380" r="3" fill="#3b82f6" opacity="0.4"/>
    <circle cx="35" cy="380" r="2" fill="#3b82f6" opacity="0.2"/>

    <circle cx="1260" cy="380" r="3" fill="#f59e0b" opacity="0.4"/>
    <circle cx="1245" cy="380" r="2" fill="#f59e0b" opacity="0.2"/>
</svg>
